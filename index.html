<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
    <!-- font awsome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./src/output.css" />
  </head>
  <body>
    <!-- header section starts here -->

    <header class="mx-auto container">
      <!-- header top section starts here -->

      <!-- header top section ends here -->
      <ul class="mt-3 totalCardItems">
        <a href="#">
          <li class="w-24 bg-amber-400 rounded-sm py-3 px-6 text-xl">
            <i class="fa-solid fa-cart-shopping"> 0 </i>
          </li>
        </a>
      </ul>
    </header>
    <!-- header section ends here -->
    <!-- Main product section starts here-->

    <section class="grid-cols-2 container mx-auto mt-4">
      <div class="">
        <h2 class="text-4xl">Checkout Thapa Store</h2>
      </div>

      <section class="container">
        <div
          id="productContainer"
          class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"
        ></div>
      </section>
    </section>

    <!-- product templete starts here -->

    <template id="productTemplate">
      <div id="cardValue">
        <div class="flex flex-col justify-between bg-amber-200 p-2">
          <span class="category"></span>
          <div class="imageContainer">
            <img class="productImage" src="" alt="" />
          </div>
          <h2 class="productName"></h2>

          <div class="productRating">
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star"></i>
          </div>

          <p class="productDescription"></p>

          <div class="productPriceElement flex flex-row gap-6">
            <p class="productPrice"></p>
            <p class="productActualPrice line-through"></p>
          </div>

          <div class="productStockElement flex flex-row gap-1.5">
            <p class="productProperty">Total Stocks Available:</p>
            <p class="productStock"></p>
          </div>

          <div class="productQuantityElement flex gap-4 items-center">
            <p class="productProperty">Quantity(Pieces)</p>
            <div class="stockElement flex gap-4 items-center text-xl">
              <button class="cartIncrement border p-3">+</button>
              <p class="productQuantity border p-4">1</p>
              <button class="cartDecrement border p-3">-</button>
            </div>
          </div>

          <button class="add-to-cart-button bg-amber-600 py-2 rounded-xl mt-1">
            <i class="fa-solid fa-cart-shopping"></i> Add To Cart
          </button>
        </div>
      </div>
    </template>

    <!-- product templete ends here -->
    <!-- Main product section ends here-->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
